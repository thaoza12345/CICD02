on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: electricity-api-v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test

      - name: Lint check (Syntax Check)
        run: node --check index.js

      - name: Build Docker Image
        run: |
          docker build -t electricity-api:${{ github.sha }} .
          echo "Build successful"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: electricity-api-v2

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t electricity-api:prod-${{ github.sha }} .
          echo "Production image built successfully."
