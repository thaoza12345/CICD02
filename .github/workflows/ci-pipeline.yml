name: Node.js CI with Docker Build

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: electricity-api-v2
      
      - name: Run Unit Tests # <--- NEW STEP
        run: npm test
        working-directory : electricity-api-v2

      - name: Lint check (Syntax Check)
        run: node --check index.js
        working-directory: electricity-api-v2

      - name: Build Docker Image
        run: |
          docker build -t electricity-api:${{ github.sha }} .
          echo "Build successful"
        working-directory: electricity-api-v2
  build-and-push:
    needs: test # <--- This job ONLY runs if the "test" job passes!
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Docker Image
    run: |
      docker build -t electricity-api:prod-${{ github.sha }} .
      echo "Production image built successfully."